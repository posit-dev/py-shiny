# Translation of pyrightconfig.json for the parallel CI evaluation.
#
# Direct mappings:
# - pythonPlatform=All -> linux (Pyrefly's documented cross-platform fallback)
# - ignore -> project-excludes
# - stubPath's Pyright default (./typings) -> site-package-path
# - reportPrivateUsage=none -> no-access="ignore"
#
# Pyrefly's default project preset is the migration target for Pyright strict;
# its similarly named strict preset additionally enables checks (including
# mandatory @override decorators) that Pyright strict explicitly leaves off.
#
# Pyrefly 1.1.1 has no diagnostics corresponding to reportImportCycles,
# reportUnusedFunction, or reportUnnecessaryIsInstance, so those Pyright
# disables require no Pyrefly override. The examples/ execution environment is
# also redundant because examples/ is excluded from both checkers.
python-platform = "linux"
infer-with-first-use = false
permissive-ignores = true
baseline = "pyrefly-baseline.json"
site-package-path = ["typings"]
search-path = [
    ".",
    "tests/pytest",
    "tests/playwright",
    "tests/playwright/examples",
    "tests/playwright/shiny/bugs/0666-sidebar",
    "tests/playwright/shiny/bugs/0696-resolve-id",
    "tests/playwright/shiny/TODO/sidebar",
]
project-excludes = [
    "shiny/api-examples",
    "examples",
    "build",
    "dist",
    "typings",
    "sandbox",
    "_dev",
    ".context",
    "docs",
    "tests/playwright/deploys/*/app.py",
    "shiny/templates",
    "tests/playwright/ai_generated_apps/*/*/app*.py",
    "tests/inspect-ai/apps/*/app*.py",
    "shiny/pytest/_generate/_main.py",
    "tests/inspect-ai/scripts/evaluation.py",
]

[errors]
no-access = "ignore"

[[sub-config]]
matches = "tests/playwright/**"
# The repository has separate top-level conftest modules for pytest and
# Playwright. A single project search path cannot disambiguate both names.
replace-imports-with-any = ["conftest"]
