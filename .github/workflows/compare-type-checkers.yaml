name: Compare type checkers

on:
  workflow_dispatch:
  push:
    branches: ["main", "rc-*"]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  compare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # setuptools_scm needs tags/history to produce a version compatible
          # with shinychat's shiny>=1.4.0 dependency.
          fetch-depth: 0

      - name: Setup py-shiny
        uses: ./.github/py-shiny/setup
        with:
          python-version: "3.14"

      - name: Generate third-party stubs used by Pyright
        run: make pyright-typings

      - name: Reject new Pyrefly errors
        run: make check-pyrefly

      - name: Benchmark Pyright and Pyrefly
        if: github.event_name != 'push'
        run: python scripts/compare_type_checkers.py --runs 3

      - name: Upload raw results
        if: always() && github.event_name != 'push'
        uses: actions/upload-artifact@v6
        with:
          name: type-checker-comparison
          path: type-checker-results/
