# The Playwright image is mirrored to GHCR (ghcr.io/<owner>/<repo>/playwright)
# as a lazy pull-through cache. GHCR is co-located with the runners, so a hit
# is a fast pull with no Azure/MCR round-trip; a miss falls back to MCR and
# pushes the image to GHCR for the next run. No separate mirror workflow.
# The container runs `playwright run-server`; pytest-playwright on the host
# connects via $PW_TEST_CONNECT_WS_ENDPOINT, so test code is unchanged.
#
# Requires the calling job to grant `permissions: packages: write` so the
# GITHUB_TOKEN can push to GHCR.
name: "Setup remote Playwright"
description: "Start a Playwright server in Docker and configure pytest-playwright to connect to it"
inputs:
  version:
    description: "Playwright version to use. Defaults to the installed Python package version."
    required: false
    default: ""
  browser:
    description: "Browser to use when verifying the remote Playwright server is ready"
    required: false
    default: "chromium"
  port:
    description: "Port to expose the Playwright server on"
    required: false
    default: "43424"
  container-name:
    description: "Docker container name"
    required: false
    default: "playwright"
outputs:
  version:
    description: "Resolved Playwright version"
    value: ${{ steps.resolve-version.outputs.version }}
  ws-endpoint:
    description: "WebSocket endpoint for the Playwright server"
    value: ${{ steps.set-env.outputs.ws-endpoint }}
runs:
  using: "composite"
  steps:
    - name: Resolve Playwright version
      id: resolve-version
      shell: bash
      run: |
        VERSION="${{ inputs.version }}"
        if [ -z "$VERSION" ]; then
          VERSION=$(python3 -c "from importlib.metadata import version; print(version('playwright'))")
        fi

        echo "version=$VERSION" >> "$GITHUB_OUTPUT"

    - name: Log in to GHCR
      shell: bash
      run: |
        echo "${{ github.token }}" | docker login ghcr.io \
          -u "${{ github.actor }}" --password-stdin

    - name: Ensure Playwright image (GHCR pull-through cache)
      shell: bash
      run: |
        VERSION="${{ steps.resolve-version.outputs.version }}"
        MCR_REF="mcr.microsoft.com/playwright:v${VERSION}-noble"

        # GHCR package names must be lowercase.
        OWNER_REPO="$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')"
        GHCR_REF="ghcr.io/${OWNER_REPO}/playwright:v${VERSION}-noble"

        # Fast path: image already mirrored to GHCR (co-located with the
        # runner, no MCR round-trip). Tag it to the MCR name so the rest of
        # this action is agnostic about where the image came from.
        if docker pull "$GHCR_REF"; then
          echo "Pulled $GHCR_REF from GHCR."
          docker tag "$GHCR_REF" "$MCR_REF"
          exit 0
        fi

        echo "GHCR miss for $GHCR_REF; falling back to MCR."

        # MCR (Azure Front Door) intermittently returns "The request is blocked"
        # for GitHub Actions runners. Retry a few times before giving up.
        attempt=1
        max_attempts=5
        until docker pull "$MCR_REF"; do
          if [ "$attempt" -ge "$max_attempts" ]; then
            echo "Failed to pull $MCR_REF after $attempt attempts" >&2
            exit 1
          fi
          sleep_seconds=$((attempt * 10))
          echo "docker pull failed (attempt $attempt/$max_attempts); retrying in ${sleep_seconds}s..." >&2
          sleep "$sleep_seconds"
          attempt=$((attempt + 1))
        done

        # Populate GHCR for the next run. Idempotent: concurrent first-runs on
        # a fresh version push the same digest. A failed push must not fail the
        # job — we already have the image locally.
        docker tag "$MCR_REF" "$GHCR_REF"
        if docker push "$GHCR_REF"; then
          echo "Mirrored $MCR_REF -> $GHCR_REF."
        else
          echo "Failed to push $GHCR_REF; continuing with local image." >&2
        fi

    - name: Start Playwright server
      shell: bash
      run: |
        docker rm -f "${{ inputs.container-name }}" >/dev/null 2>&1 || true

        docker run -d \
          --name "${{ inputs.container-name }}" \
          --ipc=host \
          -p "127.0.0.1:${{ inputs.port }}:${{ inputs.port }}" \
          --rm \
          --init \
          --workdir /home/pwuser \
          --user pwuser \
          "mcr.microsoft.com/playwright:v${{ steps.resolve-version.outputs.version }}-noble" \
          /bin/sh -c "npx -y playwright@${{ steps.resolve-version.outputs.version }} run-server --port ${{ inputs.port }} --host 0.0.0.0"

    - name: Wait for Playwright server
      shell: bash
      run: |
        python3 - <<'PY'
        from playwright.sync_api import Error, sync_playwright
        import socket
        import time

        host = "127.0.0.1"
        port = int("${{ inputs.port }}")
        browser_name = "${{ inputs.browser }}"
        ws_endpoint = f"ws://{host}:{port}/"
        deadline = time.time() + 60
        last_error = None

        while time.time() < deadline:
            with socket.socket(socket.AF_INET, socket.SOCK_STREAM) as sock:
                sock.settimeout(1)
                try:
                    sock.connect((host, port))
                except OSError:
                    time.sleep(1)
                    continue
            try:
                with sync_playwright() as playwright:
                    browser_type = getattr(playwright, browser_name)
                    browser = browser_type.connect(
                        ws_endpoint,
                        expose_network="*",
                        timeout=10000,
                    )
                    browser.close()
                    break
            except Error as err:
                last_error = err
                time.sleep(1)
        else:
            raise SystemExit(
                f"Timed out waiting for Playwright {browser_name} server "
                f"on {ws_endpoint}: {last_error}"
            )
        PY

    - name: Show Playwright server logs on failure
      if: failure()
      shell: bash
      run: |
        docker logs "${{ inputs.container-name }}" || true

    - name: Export Playwright connection env vars
      id: set-env
      shell: bash
      run: |
        WS_ENDPOINT="ws://127.0.0.1:${{ inputs.port }}/"
        echo "PW_TEST_CONNECT_WS_ENDPOINT=$WS_ENDPOINT" >> "$GITHUB_ENV"
        echo 'PW_TEST_CONNECT_EXPOSE_NETWORK=*' >> "$GITHUB_ENV"
        echo "ws-endpoint=$WS_ENDPOINT" >> "$GITHUB_OUTPUT"
